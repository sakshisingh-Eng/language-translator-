<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Feedback Display</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f4f4;
    }
    .feedback-container {
      max-width: 800px;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .feedback-entry {
      margin-bottom: 20px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 15px;
    }
    .rating {
      font-size: 24px;
      margin-bottom: 5px;
      color: #ffc107; /* Yellow color for rating */
    }
    .feedback-text {
      font-size: 18px;
      color: #555;
    }
    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 20px;
    }
    .no-feedback {
      font-size: 18px;
      color: #777;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="feedback-container">
    <h1>Feedback</h1>
    <div class="rating" id="rating"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <script>
    // Retrieve saved feedback from localStorage
    const savedFeedback = localStorage.getItem("feedback");
    if (savedFeedback) {
      const { rating, feedback } = JSON.parse(savedFeedback);
      document.getElementById("rating").textContent = `Rating: ${rating.replace('rate-', '')} star(s)`;
      document.getElementById("feedback").textContent = `Feedback: ${feedback}`;
    } else {
      document.getElementById("rating").textContent = "No feedback submitted yet.";
    }
  </script>
</body>
</html>
