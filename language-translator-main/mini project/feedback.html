<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Star Rating Form | AksharVaani</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/8cf7670e58.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <div class="post">
      <div class="text">Thanks for rating us!</div>
      <div class="edit">EDIT</div>
    </div>
    <div class="star-widget">
      <input type="radio" name="rate" id="rate-5">
      <label for="rate-5" class="fas fa-star"></label>
      <input type="radio" name="rate" id="rate-4">
      <label for="rate-4" class="fas fa-star"></label>
      <input type="radio" name="rate" id="rate-3">
      <label for="rate-3" class="fas fa-star"></label>
      <input type="radio" name="rate" id="rate-2">
      <label for="rate-2" class="fas fa-star"></label>
      <input type="radio" name="rate" id="rate-1">
      <label for="rate-1" class="fas fa-star"></label>
      <form id="feedbackForm">
        <header></header>
        <div class="textarea">
          <textarea id="feedback" cols="30" placeholder="Describe your experience.."></textarea>
        </div>
        <div class="btn">
          <button type="submit">Post</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    const btn = document.querySelector("button");
    const post = document.querySelector(".post");
    const widget = document.querySelector(".star-widget");
    const editBtn = document.querySelector(".edit");

    btn.onclick = () => {
      widget.style.display = "none";
      post.style.display = "block";
      editBtn.onclick = () => {
        widget.style.display = "block";
        post.style.display = "none";
      };

      // Save rating and feedback locally
      const rating = document.querySelector("input[name='rate']:checked").id;
      const feedback = document.getElementById("feedback").value;
      const feedbackData = { rating, feedback };
      localStorage.setItem("feedback", JSON.stringify(feedbackData));

      return false;
    };

    // Check if there is saved feedback and display it
    window.onload = () => {
      const savedFeedback = localStorage.getItem("feedback");
      if (savedFeedback) {
        const { rating, feedback } = JSON.parse(savedFeedback);
        document.getElementById(rating).checked = true;
        document.getElementById("feedback").value = feedback;
        widget.style.display = "none";
        post.style.display = "block";
      }
    };
  </script>
</body>
</html>
